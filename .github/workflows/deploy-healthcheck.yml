name: Deploy HealthCheckApp to Node.js App Services

# Enumerates all Node.js App Services across one or more Azure subscriptions
# and deploys the pre-built packages/app.zip from the repository to each target.
#
# app.zip is expected at packages/app.zip in the repo root.
# No build step — the package is committed to the repo.
# No secrets required — Azure login is handled automatically by the self-hosted runner.

on:
  workflow_dispatch:
    inputs:
      subscription_ids:
        description: >
          Comma-separated Azure subscription IDs to scan.
          Leave blank to scan all subscriptions accessible to the runner.
        required: false
        default: ""
      dry_run:
        description: "Dry run — enumerate targets but skip deployment"
        type: boolean
        required: false
        default: false
      node_stack_filter:
        description: >
          Stack prefix filter for Linux App Services (e.g. NODE|20, NODE).
          Leave blank to match all Node versions.
        required: false
        default: "NODE"
      health_check_path:
        description: "Health endpoint to probe after each deploy (relative path)"
        required: false
        default: "/health"

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Enumerate all Node.js App Services across subscriptions.
  #        Outputs a JSON matrix consumed by the deploy job.
  # ──────────────────────────────────────────────────────────────────────────
  enumerate:
    name: Enumerate Node.js App Services
    runs-on: [self-hosted, linux]

    outputs:
      targets: ${{ steps.enumerate.outputs.targets }}
      count: ${{ steps.enumerate.outputs.count }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Enumerate Node.js App Services
        id: enumerate
        env:
          SUBSCRIPTION_IDS_INPUT: ${{ inputs.subscription_ids }}
          NODE_STACK_FILTER: ${{ inputs.node_stack_filter }}
        run: pwsh scripts/Enumerate-AppServices.ps1

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy in parallel to each discovered App Service.
  #        Skipped entirely when dry_run=true.
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy → ${{ matrix.target.app_name }} (${{ matrix.target.subscription_id }})"
    runs-on: [self-hosted, linux]
    needs: enumerate
    if: ${{ inputs.dry_run != true && fromJson(needs.enumerate.outputs.count) > 0 }}

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        target: ${{ fromJson(needs.enumerate.outputs.targets) }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify packages/app.zip exists
        run: |
          if [[ ! -f "packages/app.zip" ]]; then
            echo "::error::packages/app.zip not found in repository. Commit the package before running this workflow."
            exit 1
          fi
          echo "packages/app.zip found ($(du -sh packages/app.zip | cut -f1))"

      - name: Deploy packages/app.zip to ${{ matrix.target.app_name }}
        id: deploy
        env:
          APP_NAME: ${{ matrix.target.app_name }}
          RESOURCE_GROUP: ${{ matrix.target.resource_group }}
          SUBSCRIPTION_ID: ${{ matrix.target.subscription_id }}
        run: |
          echo "::group::Deploying to ${APP_NAME} (rg: ${RESOURCE_GROUP}, sub: ${SUBSCRIPTION_ID})"
          az account set --subscription "${SUBSCRIPTION_ID}"
          az webapp deploy \
            --name "${APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --src-path packages/app.zip \
            --type zip \
            --async false \
            --only-show-errors
          echo "::endgroup::"
          echo "deployed=true" >> "$GITHUB_OUTPUT"

      - name: Health check ${{ matrix.target.app_name }}
        if: steps.deploy.outputs.deployed == 'true'
        env:
          APP_NAME: ${{ matrix.target.app_name }}
          HEALTH_PATH: ${{ inputs.health_check_path }}
        run: |
          HEALTH_URL="https://${APP_NAME}.azurewebsites.net${HEALTH_PATH}"
          echo "Probing ${HEALTH_URL} (up to 3 min)..."
          for i in $(seq 1 18); do
            STATUS=$(curl -o /dev/null -fsS --max-time 15 -w "%{http_code}" "${HEALTH_URL}" 2>/dev/null || echo "000")
            if [[ "${STATUS}" == "200" ]]; then
              echo "Health check passed (HTTP 200) after attempt ${i}"
              exit 0
            fi
            echo "  attempt ${i}/18 — HTTP ${STATUS}, retrying in 10s..."
            sleep 10
          done
          echo "::warning::Health check did not pass for ${APP_NAME} within 3 minutes. Status last seen: ${STATUS}"
          exit 1

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Summary — always runs; prints a table of targets and results.
  # ──────────────────────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: [self-hosted, linux]
    needs: [enumerate, deploy]
    if: always()

    steps:
      - name: Write job summary
        env:
          TARGETS_JSON: ${{ needs.enumerate.outputs.targets }}
          TARGET_COUNT: ${{ needs.enumerate.outputs.count }}
          DRY_RUN: ${{ inputs.dry_run }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        shell: pwsh
        run: |
          $mode         = if ($env:DRY_RUN -eq 'true') { 'Dry run (enumerate only)' } else { 'Live deploy' }
          $deployResult = if ($env:DEPLOY_RESULT) { $env:DEPLOY_RESULT } else { 'skipped' }
          $filter       = '${{ inputs.node_stack_filter }}'

          $summary = @"
          ## HealthCheckApp Deployment Summary

          | Field | Value |
          |---|---|
          | Mode | $mode |
          | Targets found | $($env:TARGET_COUNT) |
          | Deploy job result | $deployResult |
          | Node stack filter | $filter |
          | Package | packages/app.zip |

          ### Targets Enumerated

          "@

          if ([string]::IsNullOrEmpty($env:TARGETS_JSON) -or $env:TARGETS_JSON -eq '[]') {
            $summary += "`nNo Node.js App Services found matching the filter.`n"
          }
          else {
            $targets = $env:TARGETS_JSON | ConvertFrom-Json
            $summary += "| App Name | Resource Group | Subscription | OS | Stack |`n"
            $summary += "|---|---|---|---|---|`n"
            foreach ($t in $targets) {
              $summary += "| $($t.app_name) | $($t.resource_group) | $($t.subscription_id) | $($t.os_type) | $($t.node_stack) |`n"
            }
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
